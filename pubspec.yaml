name: news_reader_app
description: Production-ready Flutter News Reader App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_bloc: ^9.1.1
  bloc: ^9.1.0
  equatable: ^2.0.7
  go_router: ^16.0.0
  dio: ^5.9.0
  connectivity_plus: ^7.0.0
  hive_ce: ^2.11.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.3
  flutter_dotenv: ^6.0.0
  flutter_secure_storage: ^9.2.4
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  shimmer: ^3.0.0
  share_plus: ^12.0.0
  url_launcher: ^6.3.2
  get_it: ^8.2.0
  dartz: ^0.10.1
  rxdart: ^0.28.0
  intl: ^0.19.0
  hive: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.11.0
  mocktail: ^1.0.4
  bloc_test: ^10.0.0
  hive_ce_generator: ^1.9.2

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/animations/
